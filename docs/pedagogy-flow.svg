<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="13" font-weight="500" letter-spacing="3">LEARNING METHODOLOGY</text>
  
  <!-- Phase 1: Puzzle -->
  <rect x="30" y="55" width="140" height="90" rx="8" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="100" y="80" text-anchor="middle" fill="#a5b4fc" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1">PHASE 1</text>
  <text x="100" y="102" text-anchor="middle" fill="#e0e7ff" font-family="Georgia, serif" font-size="17" font-weight="700">The Puzzle</text>
  <text x="100" y="122" text-anchor="middle" fill="#818cf8" font-family="system-ui, sans-serif" font-size="10">Real-world paradox</text>
  <text x="100" y="135" text-anchor="middle" fill="#818cf8" font-family="system-ui, sans-serif" font-size="10">with real data</text>
  
  <!-- Arrow 1→2 -->
  <line x1="175" y1="100" x2="200" y2="100" stroke="#4f46e5" stroke-width="2" filter="url(#glow)"/>
  <polygon points="200,95 210,100 200,105" fill="#4f46e5"/>
  
  <!-- Phase 2: Read -->
  <rect x="215" y="55" width="140" height="90" rx="8" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="285" y="80" text-anchor="middle" fill="#c4b5fd" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1">PHASE 2</text>
  <text x="285" y="102" text-anchor="middle" fill="#ede9fe" font-family="Georgia, serif" font-size="17" font-weight="700">Read</text>
  <text x="285" y="122" text-anchor="middle" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="10">MIT · Harvard · Yale</text>
  <text x="285" y="135" text-anchor="middle" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="10">style questions</text>

  <!-- Arrow 2→3 -->
  <line x1="360" y1="100" x2="385" y2="100" stroke="#7c3aed" stroke-width="2" filter="url(#glow)"/>
  <polygon points="385,95 395,100 385,105" fill="#7c3aed"/>
  
  <!-- Phase 3: Model -->
  <rect x="400" y="55" width="140" height="90" rx="8" fill="#1a1a2e" stroke="#ec4899" stroke-width="1.5"/>
  <text x="470" y="80" text-anchor="middle" fill="#f9a8d4" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1">PHASE 3</text>
  <text x="470" y="102" text-anchor="middle" fill="#fce7f3" font-family="Georgia, serif" font-size="17" font-weight="700">Model</text>
  <text x="470" y="122" text-anchor="middle" fill="#f472b6" font-family="system-ui, sans-serif" font-size="10">Interactive React</text>
  <text x="470" y="135" text-anchor="middle" fill="#f472b6" font-family="system-ui, sans-serif" font-size="10">drag · slide · explore</text>

  <!-- Arrow 3→4 -->
  <line x1="545" y1="100" x2="570" y2="100" stroke="#db2777" stroke-width="2" filter="url(#glow)"/>
  <polygon points="570,95 580,100 570,105" fill="#db2777"/>
  
  <!-- Phase 4: Debate -->
  <rect x="585" y="55" width="140" height="90" rx="8" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="655" y="80" text-anchor="middle" fill="#fcd34d" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1">PHASE 4</text>
  <text x="655" y="102" text-anchor="middle" fill="#fef3c7" font-family="Georgia, serif" font-size="17" font-weight="700">Debate</text>
  <text x="655" y="122" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="10">Argue both sides</text>
  <text x="655" y="135" text-anchor="middle" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="10">of a policy question</text>

  <!-- Arrow 4→5 -->
  <line x1="730" y1="100" x2="755" y2="100" stroke="#d97706" stroke-width="2" filter="url(#glow)"/>
  <polygon points="755,95 765,100 755,105" fill="#d97706"/>
  
  <!-- Phase 5: Data -->
  <rect x="770" y="55" width="105" height="90" rx="8" fill="#1a1a2e" stroke="#10b981" stroke-width="1.5"/>
  <text x="822" y="80" text-anchor="middle" fill="#6ee7b7" font-family="system-ui, sans-serif" font-size="11" font-weight="600" letter-spacing="1">PHASE 5</text>
  <text x="822" y="102" text-anchor="middle" fill="#d1fae5" font-family="Georgia, serif" font-size="17" font-weight="700">Data</text>
  <text x="822" y="122" text-anchor="middle" fill="#34d399" font-family="system-ui, sans-serif" font-size="10">OECD · FRED</text>
  <text x="822" y="135" text-anchor="middle" fill="#34d399" font-family="system-ui, sans-serif" font-size="10">Real-world test</text>

  <!-- Bottom tagline -->
  <text x="450" y="175" text-anchor="middle" fill="#64748b" font-family="Georgia, serif" font-size="13" font-style="italic">Models are tools for thinking, not answers.</text>
</svg>
