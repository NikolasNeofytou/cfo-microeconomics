<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 100">
  <rect width="900" height="100" fill="#faf8f2"/>
  
  <line x1="40" y1="12" x2="860" y2="12" stroke="#c4b99a" stroke-width="0.5"/>
  
  <g font-family="Georgia, 'Times New Roman', serif" transform="translate(0, 50)">
    <!-- Phase 1 -->
    <text x="55" y="0" text-anchor="middle" fill="#8a7e6b" font-size="9" letter-spacing="1">I</text>
    <text x="55" y="16" text-anchor="middle" fill="#1a1a1a" font-size="12" font-style="italic">Puzzle</text>
    <text x="55" y="30" text-anchor="middle" fill="#8a7e6b" font-size="8">real-world paradox</text>
    
    <text x="120" y="8" fill="#c4b99a" font-size="14">—</text>
    
    <!-- Phase 2 -->
    <text x="185" y="0" text-anchor="middle" fill="#8a7e6b" font-size="9" letter-spacing="1">II</text>
    <text x="185" y="16" text-anchor="middle" fill="#1a1a1a" font-size="12" font-style="italic">Read</text>
    <text x="185" y="30" text-anchor="middle" fill="#8a7e6b" font-size="8">guided questions</text>
    
    <text x="260" y="8" fill="#c4b99a" font-size="14">—</text>
    
    <!-- Phase 3 -->
    <text x="340" y="0" text-anchor="middle" fill="#8a7e6b" font-size="9" letter-spacing="1">III</text>
    <text x="340" y="16" text-anchor="middle" fill="#1a1a1a" font-size="12" font-style="italic">Model</text>
    <text x="340" y="30" text-anchor="middle" fill="#8a7e6b" font-size="8">interactive React</text>
    
    <text x="420" y="8" fill="#c4b99a" font-size="14">—</text>
    
    <!-- Phase 4 -->
    <text x="500" y="0" text-anchor="middle" fill="#8a7e6b" font-size="9" letter-spacing="1">IV</text>
    <text x="500" y="16" text-anchor="middle" fill="#1a1a1a" font-size="12" font-style="italic">Debate</text>
    <text x="500" y="30" text-anchor="middle" fill="#8a7e6b" font-size="8">argue both sides</text>
    
    <text x="580" y="8" fill="#c4b99a" font-size="14">—</text>
    
    <!-- Phase 5 -->
    <text x="660" y="0" text-anchor="middle" fill="#8a7e6b" font-size="9" letter-spacing="1">V</text>
    <text x="660" y="16" text-anchor="middle" fill="#1a1a1a" font-size="12" font-style="italic">Data Lab</text>
    <text x="660" y="30" text-anchor="middle" fill="#8a7e6b" font-size="8">test against reality</text>
  </g>
  
  <line x1="40" y1="88" x2="860" y2="88" stroke="#c4b99a" stroke-width="0.5"/>
</svg>
