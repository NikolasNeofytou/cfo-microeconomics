<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200">
  <rect width="900" height="200" fill="#faf8f2"/>
  
  <!-- Top rule -->
  <line x1="40" y1="20" x2="860" y2="20" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="40" y1="23" x2="860" y2="23" stroke="#1a1a1a" stroke-width="0.3"/>
  
  <!-- Left column: book info -->
  <text x="48" y="58" fill="#1a1a1a" font-family="Georgia, 'Times New Roman', serif" font-size="11" letter-spacing="3" font-weight="400">CASE · FAIR · OSTER</text>
  <text x="48" y="92" fill="#1a1a1a" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-weight="400" font-style="italic">Principles of Microeconomics</text>
  <text x="48" y="118" fill="#6b6b6b" font-family="Georgia, 'Times New Roman', serif" font-size="13" font-style="italic">Study modules — Puzzle · Read · Model · Debate · Data</text>
  
  <!-- Divider -->
  <line x1="48" y1="132" x2="520" y2="132" stroke="#c4b99a" stroke-width="0.5"/>
  
  <!-- Phase markers -->
  <g font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="#8a7e6b">
    <text x="48" y="152">I</text>
    <text x="62" y="152" font-style="italic" fill="#5a5347">The Puzzle</text>
    <text x="148" y="152">II</text>
    <text x="164" y="152" font-style="italic" fill="#5a5347">Read</text>
    <text x="218" y="152">III</text>
    <text x="238" y="152" font-style="italic" fill="#5a5347">Model</text>
    <text x="308" y="152">IV</text>
    <text x="326" y="152" font-style="italic" fill="#5a5347">Debate</text>
    <text x="400" y="152">V</text>
    <text x="414" y="152" font-style="italic" fill="#5a5347">Data Lab</text>
  </g>
  
  <!-- Right column: small supply/demand sketch -->
  <g transform="translate(660, 42)">
    <!-- Axes -->
    <line x1="0" y1="95" x2="150" y2="95" stroke="#1a1a1a" stroke-width="0.6"/>
    <line x1="0" y1="0" x2="0" y2="95" stroke="#1a1a1a" stroke-width="0.6"/>
    
    <!-- Demand curve -->
    <path d="M10,10 Q75,45 140,85" fill="none" stroke="#8b4513" stroke-width="1.2"/>
    <text x="143" y="82" font-family="Georgia, serif" font-size="9" font-style="italic" fill="#8b4513">D</text>
    
    <!-- Supply curve -->
    <path d="M10,85 Q75,55 140,15" fill="none" stroke="#2f4f4f" stroke-width="1.2"/>
    <text x="143" y="18" font-family="Georgia, serif" font-size="9" font-style="italic" fill="#2f4f4f">S</text>
    
    <!-- Equilibrium dot -->
    <circle cx="75" cy="50" r="2.5" fill="#1a1a1a"/>
    
    <!-- Dashed lines to axes -->
    <line x1="75" y1="50" x2="75" y2="95" stroke="#1a1a1a" stroke-width="0.4" stroke-dasharray="3 2"/>
    <line x1="75" y1="50" x2="0" y2="50" stroke="#1a1a1a" stroke-width="0.4" stroke-dasharray="3 2"/>
    
    <!-- Labels -->
    <text x="73" y="108" text-anchor="middle" font-family="Georgia, serif" font-size="8" font-style="italic" fill="#6b6b6b">Q*</text>
    <text x="-8" y="53" text-anchor="end" font-family="Georgia, serif" font-size="8" font-style="italic" fill="#6b6b6b">P*</text>
    <text x="75" y="-5" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#6b6b6b">equilibrium</text>
  </g>
  
  <!-- Bottom rule -->
  <line x1="40" y1="172" x2="860" y2="172" stroke="#1a1a1a" stroke-width="0.3"/>
  <line x1="40" y1="175" x2="860" y2="175" stroke="#1a1a1a" stroke-width="1.5"/>
  
  <!-- Footer -->
  <text x="48" y="192" fill="#8a7e6b" font-family="Georgia, 'Times New Roman', serif" font-size="9" letter-spacing="1">OECD · FRED · WORLD BANK DATA</text>
  <text x="860" y="192" text-anchor="end" fill="#8a7e6b" font-family="Georgia, 'Times New Roman', serif" font-size="9" letter-spacing="1">28 COUNTRIES · 7 CHAPTERS</text>
</svg>
